version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: grove
    binary: grove
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/zachthieme/grove/cmd.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "grove_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
