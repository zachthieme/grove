# Generates TypeScript types from Go DTOs in internal/apitypes.
# Run via `make types-gen`. CI verifies the output is up to date via
# `make types-gen-check`.
#
# OrgNodeFields and the NodeType/Status enums are hand-defined in
# web/src/api/types.ts (the leaf TS file the generated file sits next
# to). Generated interfaces extend those when the Go source embeds.

packages:
  - path: github.com/zachthieme/grove/internal/apitypes
    output_path: web/src/api/types.generated.ts
    type_mappings:
      time.Time: string
      model.OrgNodeFields: OrgNodeFields
    frontmatter: |
      // Code generated by tygo from internal/apitypes. DO NOT EDIT.
      // Run `make types-gen` to regenerate.

      import type { OrgNodeFields } from './types'
    exclude_files:
      - types_test.go
