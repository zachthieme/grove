name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend
        run: cd web && npm ci && npm run build
      - name: Go tests
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: Go coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: Go benchmarks
        run: |
          go test -bench=. -benchmem ./internal/api/ -count=5 -benchtime=100ms | tee bench-current.txt
      - name: Compare benchmarks to baseline
        run: |
          if [ -f testdata/bench-baseline.txt ]; then
            go install golang.org/x/perf/cmd/benchstat@latest
            benchstat testdata/bench-baseline.txt bench-current.txt || true
          else
            echo "No baseline found — skipping comparison. To create one, commit testdata/bench-baseline.txt."
          fi
      - name: Frontend tests
        run: cd web && npm test -- --coverage

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: cd web && npm ci
      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps
      - name: Build and run E2E tests
        run: make e2e

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend (needed for go:embed)
        run: cd web && npm ci && npm run build
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0
