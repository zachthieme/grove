name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend
        run: cd web && npm ci && npm run build
      - name: Go tests
        run: go test -race -count=1 ./...
      - name: Frontend tests
        run: cd web && npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend (needed for go:embed)
        run: cd web && npm ci && npm run build
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0
